version: '3.8'

services:
  web:
    build: .
    restart: always
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=http://localhost
      # Put runtime env variables with `docker-compose --env-file .env` or set on server
    networks:
      - webnet
    expose:
      - '3000'

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/ssl/certs:ro
    depends_on:
      - web
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
