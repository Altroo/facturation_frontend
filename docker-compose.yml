# Production docker-compose configuration
services:
  web:
    build: .
    container_name: facturation_frontend_web
    restart: always
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    extra_hosts:
      - "facturation-api.elbouazzatiholding.ma:host-gateway"
    networks:
      - webnet
    expose:
      - '3000'
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f bun || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /etc/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/nginx/certs:/etc/ssl/certs:ro
    depends_on:
      - web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
