<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Receipt Paper with notched top -->
  <path d="M100 60 L110 50 L120 60 L130 50 L140 60 L150 50 L160 60 L170 50 L180 60 L190 50 L200 60 L210 50 L220 60 L230 50 L240 60 L250 50 L260 60 L270 50 L280 60 L290 50 L300 60 L300 360 L100 360 Z" fill="#FFFFFF" stroke="#34495E" stroke-width="3"/>
  
  <!-- Store Name -->
  <rect x="140" y="80" width="120" height="15" rx="4" fill="#E74C3C"/>
  <rect x="160" y="100" width="80" height="8" rx="2" fill="#95A5A6"/>
  
  <!-- Dashed Separator -->
  <line x1="120" y1="130" x2="280" y2="130" stroke="#BDC3C7" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Receipt Items -->
  <g>
    <rect x="120" y="150" width="100" height="8" rx="2" fill="#ECF0F1"/>
    <rect x="240" y="150" width="40" height="8" rx="2" fill="#3498DB"/>
  </g>
  <g>
    <rect x="120" y="170" width="90" height="8" rx="2" fill="#ECF0F1"/>
    <rect x="240" y="170" width="40" height="8" rx="2" fill="#3498DB"/>
  </g>
  <g>
    <rect x="120" y="190" width="110" height="8" rx="2" fill="#ECF0F1"/>
    <rect x="240" y="190" width="40" height="8" rx="2" fill="#3498DB"/>
  </g>
  <g>
    <rect x="120" y="210" width="95" height="8" rx="2" fill="#ECF0F1"/>
    <rect x="240" y="210" width="40" height="8" rx="2" fill="#3498DB"/>
  </g>
  
  <!-- Dashed Separator -->
  <line x1="120" y1="240" x2="280" y2="240" stroke="#BDC3C7" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Total -->
  <rect x="120" y="260" width="60" height="12" rx="3" fill="#2C3E50"/>
  <rect x="220" y="260" width="60" height="15" rx="4" fill="#27AE60"/>
  
  <!-- Thank You Message -->
  <rect x="150" y="300" width="100" height="8" rx="2" fill="#95A5A6"/>
  <rect x="160" y="315" width="80" height="6" rx="2" fill="#BDC3C7"/>
</svg>
