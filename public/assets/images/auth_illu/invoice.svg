<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Invoice Document -->
  <rect x="80" y="40" width="240" height="320" rx="8" fill="#FFFFFF" stroke="#2C3E50" stroke-width="3"/>
  
  <!-- Document Header -->
  <rect x="100" y="60" width="120" height="12" rx="6" fill="#3498DB"/>
  <rect x="100" y="80" width="80" height="8" rx="4" fill="#95A5A6"/>
  
  <!-- Invoice Lines -->
  <rect x="100" y="110" width="200" height="6" rx="3" fill="#ECF0F1"/>
  <rect x="100" y="130" width="180" height="6" rx="3" fill="#ECF0F1"/>
  <rect x="100" y="150" width="200" height="6" rx="3" fill="#ECF0F1"/>
  <rect x="100" y="170" width="160" height="6" rx="3" fill="#ECF0F1"/>
  
  <!-- Divider -->
  <line x1="90" y1="200" x2="310" y2="200" stroke="#BDC3C7" stroke-width="2"/>
  
  <!-- More Lines -->
  <rect x="100" y="220" width="200" height="6" rx="3" fill="#ECF0F1"/>
  <rect x="100" y="240" width="190" height="6" rx="3" fill="#ECF0F1"/>
  <rect x="100" y="260" width="200" height="6" rx="3" fill="#ECF0F1"/>
  
  <!-- Total Section -->
  <rect x="180" y="290" width="120" height="30" rx="4" fill="#27AE60"/>
  <rect x="195" y="300" width="90" height="10" rx="2" fill="#FFFFFF"/>
  
  <!-- Checkmark Badge -->
  <circle cx="300" cy="100" r="30" fill="#27AE60"/>
  <path d="M285 100 L295 110 L315 90" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
