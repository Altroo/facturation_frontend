# ─── CATCH-ALL: reject requests by IP or unknown hostnames ───────────────────
server {
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/certs/privkey.pem;

    # Drop the connection — do not serve content to unknown hosts
    return 444;
}
